version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:0.7.0-pg16
    container_name: immipulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: immipulse
      POSTGRES_USER: ${DB_USER:-yutian}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    networks:
      - internal-net
    ports:
      - "127.0.0.1:5432:5432"

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.2
    container_name: immipulse-embeddings
    restart: unless-stopped
    command: --model-id sentence-transformers/all-MiniLM-L6-v2
    volumes:
      - tei-cache:/data
    networks:
      - internal-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: immipulse-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DATABASE_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=immipulse
      - DB_POSTGRESDB_USER=${DB_USER:-yutian}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal-net
    ports:
      - "127.0.0.1:5678:5678"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immipulse-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-yutian}:${DB_PASSWORD}@postgres:5432/immipulse
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
    depends_on:
      - postgres
    networks:
      - internal-net
    ports:
      - "127.0.0.1:8000:8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: immipulse-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - backend
    networks:
      - internal-net

networks:
  internal-net:
    driver: bridge

volumes:
  pgdata:
  tei-cache:
  n8n_data:
