services:
  db:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: immipulse-db
    environment:
      POSTGRES_DB: immipulse
      POSTGRES_USER: immipulse
      POSTGRES_PASSWORD: immipulse_dev
    # Stage 5.1.2: in dev mode, expose for local tools. Production overlay
    # removes this mapping per Architecture.md §5 ("Zero Exposed Ports").
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immipulse -d immipulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./backend
    container_name: immipulse-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://immipulse:immipulse_dev@db:5432/immipulse
      JWT_SECRET: dev_jwt_secret_change_in_prod_12345
      JWT_EXPIRES_HOURS: "168"
      BCRYPT_ROUNDS: "10"
      PORT: "3000"
      NODE_ENV: development
      CORS_ORIGIN: "http://localhost:5173"
      # Stage 5.2: cookie auth configuration
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "lax"
      COOKIE_DOMAIN: ""
      # Stage 5.3.5: IAB TCF v2 consent gate
      CONSENT_REQUIRED: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@immipulse.local
    # Stage 5.1.2: api-gateway is the only host-exposed backend port.
    # In production, this mapping is removed and the only ingress is
    # cloudflared (see docker-compose.prod.yml).
    ports:
      - "3000:3000"
    command: ["node", "--import", "tsx", "src/server.ts"]

  notification-broker:
    build:
      context: ./backend
    container_name: immipulse-broker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://immipulse:immipulse_dev@db:5432/immipulse
      JWT_SECRET: dev_jwt_secret_change_in_prod_12345
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@immipulse.local
      BROKER_POLL_INTERVAL_SECONDS: "15"
      SCRAPER_FAILURE_WINDOW_HOURS: "8"
    command: ["node", "--import", "tsx", "src/notifications/broker.ts"]

  ingestion-service:
    build:
      context: ./ingestion
    container_name: immipulse-ingestion
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://immipulse:immipulse_dev@db:5432/immipulse
      EMBEDDING_PROVIDER: mock
      OPENAI_API_KEY: ""
      OPENAI_EMBEDDING_MODEL: text-embedding-3-large
      FIFTY_PERCENT_PROVIDER: token_overlap
      LLM_API_KEY: ""
      LLM_BASE_URL: "https://api.anthropic.com"
      LLM_MODEL: "claude-3-5-haiku-latest"
      LLM_REVIEW_THRESHOLD: "0.85"
      SCRAPER_INTERVAL_HOURS: "24"
      TTL_DAYS: "60"
      SIMILARITY_THRESHOLD: "0.88"
      ENABLED_SCRAPERS: ""
    command: ["python", "-m", "src.main"]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: immipulse-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
    container_name: immipulse-frontend
    depends_on:
      - api-gateway
    environment:
      VITE_API_BASE: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  # Stage 5.1.1: Cloudflare Tunnel daemon.
  # In local dev this service is brought up with `TUNNEL_TOKEN=` (empty)
  # which causes cloudflared to fall back to a `tunnel-disabled` no-op mode
  # (see the Dockerfile). The api-gateway port remains the only ingress.
  #
  # In production, set CLOUDFLARE_TUNNEL_TOKEN to the token issued by
  # `cloudflared tunnel create immipulse`. The tunnel routes
  # api.immipulse.com -> api-gateway:3000 and immipulse.com -> a separately
  # hosted Cloudflare Pages project.
  cloudflared:
    image: cloudflare/cloudflared:2024.5.0
    container_name: immipulse-cloudflared
    depends_on:
      - api-gateway
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:-}"
    command: ["cloudflared", "--no-autoupdate", "tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
    # Stage 5.1.1: in dev mode this container exits fast because there is
    # no tunnel. We keep it optional via restart: on-failure so the
    # overall compose stack stays healthy when the token is empty.
    restart: "no"
    volumes:
      - ./docker/cloudflared/config.yml:/etc/cloudflared/config.yml:ro

volumes:
  pgdata: