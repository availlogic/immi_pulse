# Production overlay for ImmiPulse.
#
# Activates the production posture described in Architecture.md §5:
#   - "Only the api-gateway port is mapped to the host, and it is strictly
#     protected by the cloudflared daemon tunnel."
#   - In production, even the api-gateway port mapping is removed; the only
#     ingress is cloudflared.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (inject via secrets manager):
#   CLOUDFLARE_TUNNEL_TOKEN   — issued by `cloudflared tunnel create`
#   CLOUDFLARE_TUNNEL_CRED_JSON — contents of credentials.json
#   JWT_SECRET                — strong random 64+ bytes
#   OPENAI_API_KEY            — production embedding model
#   LLM_API_KEY               — Anthropic-compatible LLM
#   SMTP_PASSWORD             — transactional email provider
#   COOKIE_SECURE=true        — required in prod (HTTPS only)
#   CONSENT_REQUIRED=true      — gate non-essential scripts

services:
  db:
    # Production: do NOT expose Postgres to the host. All DB access is via
    # the api-gateway over the private bridge.
    ports: []

  api-gateway:
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "true"
      CONSENT_REQUIRED: "true"
    # Production: no host port mapping. cloudflared routes to this
    # container via the internal Docker network.
    ports: []

  notification-broker:
    environment:
      NODE_ENV: production

  ingestion-service:
    environment:
      NODE_ENV: production

  mailhog:
    # Production: no MailHog. SMTP_PASSWORD is wired to a real provider
    # (SendGrid / Mailgun / SES) via SMTP_HOST/SMTP_PORT/SMTP_FROM.
    profiles: ["never"]

  frontend:
    # Production: frontend is hosted on Cloudflare Pages, not in compose.
    # We keep the container for preview/test environments; production
    # should `docker compose stop frontend`.
    profiles: ["preview"]

  cloudflared:
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    # The `run` command fails when TUNNEL_TOKEN is empty, so we set
    # restart: unless-stopped only when the token is non-empty. The
    # default service definition in docker-compose.yml uses `restart: no`
    # so empty-token local-dev runs don't loop.
    restart: unless-stopped