# cloudflared configuration for ImmiPulse.
#
# Two modes:
#   1. Production — TUNNEL_TOKEN env var is set. cloudflared authenticates
#      to Cloudflare and routes api.immipulse.com -> api-gateway:3000.
#   2. Local dev  — TUNNEL_TOKEN is empty. The `run` command in compose is
#      replaced by `tunnel-disabled` mode (see Dockerfile) which exits 0
#      immediately so the overall stack stays healthy.
#
# In production, replace the `tunnel:` block below with one generated by
# `cloudflared tunnel create immipulse` and `cloudflared tunnel route`.
tunnel: ${TUNNEL_TOKEN:-00000000-0000-0000-0000-000000000000}
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: api.immipulse.com
    service: http://api-gateway:3000
  - hostname: immipulse.com
    service: http://frontend:5173
  - service: http_status:404